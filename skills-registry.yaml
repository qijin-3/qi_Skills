# 技能注册表 — 由 update-skills-docs / scripts/skills-registry.py 自动维护
#
# 字段说明:
#   path        - 技能目录（相对仓库根目录）
#   name        - SKILL.md frontmatter 中的 name（也是 ~/.claude/skills/ 下的链接名）
#   description - 技能作用简述（自动从 SKILL.md 同步）
#   category    - 分类（根据目录结构推断）
#   sync        - true = 软链接到 ~/.claude/skills/；false = 仅登记不同步
#
# 手动操作: 只需编辑 sync 字段（true/false），其余字段由扫描自动更新。

version: 1
skills:
- path: skills/travel_journal/install-travel-journal
  name: install-travel-journal
  description: Travel Journal 安装引导 — 介绍 travel-journal 技能并帮助用户安装。 当用户询问 "travel-journal"、"游记生成器"、"游记技能"、"如何创建游记"
    或任何与旅行日记、行程记录相关的问题时触发。 也适用于用户想了解这个技能但尚未安装的场景。
  category: travel_journal
  sync: false
- path: skills/travel_journal/travel-journal
  name: travel-journal
  description: 游记生成器 - 帮助用户从零开始创建一个基于地图的互动旅行游记网站（静态 HTML，无需服务器）。 当用户说"创建游记"、"生成旅行日记"、"travel
    journal"、"旅行网站"、"帮我做游记"、 "记录我的旅途"、"制作行程地图"时立即触发。 也支持对已有游记项目进行后期修改（添加行程、更新日记、重跑照片匹配、更换风格）。
    检测到用户目录中有 data/days.json 时自动进入更新模式。 只要用户提到游记、旅行记录、行程可视化，都应使用此技能。
  category: travel_journal
  sync: false
- path: skills/10x-impact-judge
  name: 10x-impact-judge
  description: 10倍影响力判断器 —— 当用户提出想制作/构建/设计一个新的 Skill、Agent、App、Workflow、工具或产品时,不要直接规划实现方案,先判断这件事是否值得投入时间。核心问题:如果用户在这件事上能力提升10倍,是否会产生10倍影响?如果不会,优先建议自动化、简化或放弃。当用户说"我想做一个""帮我设计一个""这个工具/产品/app
    怎么做""要不要做这个 idea""帮我评估这个项目/想法"时,务必先触发此 skill 做影响力判断,而不是急着给实现方案。当用户陷入"用制作工具逃避真正的核心工作"(yak
    shaving / productive procrastination)时,直接戳破。注意:拦截的是"要不要投入"的决策,不是"怎么实现已决定的小任务"(写函数、改
    bug)的执行请求。
  category: uncategorized
  sync: ture
- path: skills/idea-validator
  name: idea-validator
  description: Idea 快速验证工具 - 通过结构化多步骤方法论帮助独立开发者在投入开发前验证产品想法。 覆盖危险信号预筛 → 假设锁定 → 用户声音挖掘（7
    平台）→ 竞品解构 → 综合评估的完整流程，最终输出可视化 HTML 报告。 当用户说「验证这个 idea」「分析这个产品想法」「帮我做市场调研」「这个方向值得做吗」「我有个想法」「走赛道
    A」「这个产品可行吗」，或者直接描述一个产品/创业想法时触发。
  category: uncategorized
  sync: ture
