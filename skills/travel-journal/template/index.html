    const pad = getFitPaddingArray(useFullJourney);
    return {
      paddingTopLeft: [pad[3] ?? 72, pad[0] ?? 72],
      paddingBottomRight: [pad[1] ?? 72, pad[2] ?? 96],
    };
  }

  /**
   * 动态加载外部脚本。
   */
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-src="${src}"]`);
      if (existing) {
        if (existing.dataset.loaded === "true") {
          resolve();
          return;
        }
        existing.addEventListener("load", () => resolve());
        existing.addEventListener("error", () => reject(new Error(`Failed: ${src}`)));
        return;
      }
      const script = document.createElement("script");
      script.src = src;
      script.async = true;
      script.dataset.src = src;
      script.onload = () => {
        script.dataset.loaded = "true";
        resolve();
      };
      script.onerror = () => reject(new Error(`Failed: ${src}`));
      document.head.appendChild(script);
    });
  }

  /**
   * 动态加载 Leaflet 样式表。
   */
  function loadStylesheet(href) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`link[data-href="${href}"]`)) {
        resolve();
        return;
      }
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = href;
      link.dataset.href = href;
      link.onload = () => resolve();
      link.onerror = () => reject(new Error(`Failed: ${href}`));
      document.head.appendChild(link);
    });
  }

  /**
   * 加载 Leaflet 库与样式。
   */
  async function ensureLeaflet() {
    await loadStylesheet("https://unpkg.com/leaflet@1.9.4/dist/leaflet.css");
    await loadScript("https://unpkg.com/leaflet@1.9.4/dist/leaflet.js");
    if (!window.L) {
      throw new Error("Leaflet 未加载");
    }
  }

  /**
   * 按 map.json 的 activeStyle 创建瓦片图层。
   */
  function createTileLayer() {
    const styleKey = mapConfig.activeStyle || "cinematic-dark";
    const style = mapConfig.styles?.[styleKey] || mapConfig.styles?.["cinematic-dark"];
    if (!style) {
      throw new Error(`未找到地图样式：${styleKey}`);
    }

    container.dataset.mapStyle = styleKey;
    return window.L.tileLayer(style.tileUrl, {
      attribution: style.attribution,
      subdomains: style.subdomains,
      maxZoom: style.maxZoom ?? 19,
      className: style.tileClass || "",
    });
  }

  /**
   * 初始化 Leaflet 地图（默认、免 Key）。
   */
  async function initLeaflet() {
    await ensureLeaflet();
    container.innerHTML = "";
    container.classList.add("map-canvas--leaflet");

    leafletMap = window.L.map(container, {
      zoomControl: false,
      attributionControl: true,
      preferCanvas: true,
    });

    leafletTileLayer = createTileLayer();
    leafletTileLayer.addTo(leafletMap);

    const allPath = allRoutePath.map(toLatLng);
    const fullStyle = getFullRouteStyle(false);
    leafletFullRoute = window.L.polyline(allPath, {
      ...fullStyle,
    }).addTo(leafletMap);

    leafletActiveRoute = window.L.polyline([], {
      color: TONE_COLORS.blackGold,
      weight: mapConfig.routes?.active?.weight ?? 6,
      opacity: mapConfig.routes?.active?.opacity ?? 0.55,
    }).addTo(leafletMap);

    leafletAnimSegment = window.L.polyline([], {
      color: TONE_COLORS.blackGold,
      weight: mapConfig.routes?.active?.weight ?? 6,
      opacity: mapConfig.routes?.active?.opacity ?? 0.55,
    }).addTo(leafletMap);

    locations.forEach((location) => {
      const marker = window.L.marker(toLatLng(location.coordinates), {
        icon: leafletMarkerIcon(location, "dimmed"),
        zIndexOffset: getMarkerZIndexOffset(location.id, "dimmed"),
      });
      marker.on("click", () => onSelectLocation(location.id));
      leafletMarkers.set(location.id, marker);
      marker.addTo(leafletMap);
    });

    bindPreviewHoverDelegation();

    const bounds = window.L.latLngBounds([
      [geoBounds.minLat, geoBounds.minLng],
      [geoBounds.maxLat, geoBounds.maxLng],
    ]);
    leafletMap.fitBounds(bounds, {
      ...getFitPadding(true),
      maxZoom: getFitMaxZoom(true),
    });
  }

  /**
   * 立即刷新 Leaflet 路线、点位与视野。
   */
  function updateLeafletInstant(activeDay, selectedLocationId, view) {
    const pathLatLngs = view.activePath.map((location) => toLatLng(location.coordinates));

    leafletMap.invalidateSize({ animate: false });

    leafletActiveRoute.setStyle({ color: view.color });
    leafletActiveRoute.setLatLngs(pathLatLngs);
    leafletAnimSegment?.setLatLngs([]);
    leafletFullRoute?.setStyle(getFullRouteStyle(view.fitAll));

    locations.forEach((location) => {
      const markerState = selectedLocationId === location.id
        ? "selected"
        : view.activeIds.has(location.id)
          ? "active"
          : "dimmed";
      syncMarkerState(location, markerState, selectedLocationId, false);
    });

    if (view.fitAll) {
      const allLatLngs = locations.map((location) => toLatLng(location.coordinates));
      if (allLatLngs.length > 1) {
        leafletMap.fitBounds(window.L.latLngBounds(allLatLngs), {
          ...getFitPadding(true),
          maxZoom: getFitMaxZoom(true),
          animate: false,
        });
      }
      return;
    }

    if (pathLatLngs.length > 1) {
      leafletMap.fitBounds(window.L.latLngBounds(pathLatLngs), {
        ...getFitPadding(false),
        maxZoom: getFitMaxZoom(false),
        animate: false,
      });
      return;
    }

    if (pathLatLngs.length === 1) {
      leafletMap.setView(pathLatLngs[0], Math.max(leafletMap.getZoom(), 8), { animate: false });
    }
  }

  /**
   * 将 Leaflet 路线视野对齐到当日路径（无平移动画，降低切换日期时 CPU）。
   */
  function fitLeafletToRoute(routeLocations, useFullJourneyPadding = false) {
    const pathLatLngs = routeLocations.map((location) => toLatLng(location.coordinates));
    if (pathLatLngs.length > 1) {
      leafletMap.fitBounds(window.L.latLngBounds(pathLatLngs), {
        ...getFitPadding(useFullJourneyPadding),
        maxZoom: getFitMaxZoom(useFullJourneyPadding),
        animate: false,
      });
      return;
    }
    if (pathLatLngs.length === 1) {
      leafletMap.setView(pathLatLngs[0], Math.max(leafletMap.getZoom(), 8), { animate: false });
    }
  }

  /**
   * Leaflet 轻量路线入场：分步绘线，无 rAF 循环。
   */
  async function animateLeafletRouteLight(activeDay, selectedLocationId, view, token) {
    await animateLeafletRoute(activeDay, selectedLocationId, view, token);
  }

  /**
   * Leaflet 路线入场：逐点点亮并逐段绘制连线。
   */
  async function animateLeafletRoute(activeDay, selectedLocationId, view, token) {
    const routeLocations = view.activePath;
    const routeIds = activeDay.routeLocationIds;
    const revealedIds = animationContext.revealedIds;
    const color = view.color;

    leafletActiveRoute.setStyle({ color });
    leafletActiveRoute.setLatLngs([]);
    leafletAnimSegment.setStyle({ color });
    leafletAnimSegment.setLatLngs([]);

    syncMarkersForRouteAnimation(routeIds, revealedIds, selectedLocationId);
    fitLeafletToRoute(routeLocations);

    for (let index = 0; index < routeLocations.length; index += 1) {
      if (token !== routeAnimationToken) return;

      const location = routeLocations[index];
      revealedIds.add(location.id);

      const markerState = resolveRouteMarkerState(
        location.id,
        routeIds,
        revealedIds,
        animationContext.selectedLocationId,
      );
      syncMarkerState(location, markerState, animationContext.selectedLocationId, true);

      const completedPath = routeLocations
        .slice(0, index + 1)
        .map((item) => toLatLng(item.coordinates));
      leafletActiveRoute.setLatLngs(completedPath);

      const stillRunning = await waitPointReveal(token);
      if (!stillRunning) return;

      syncMarkerState(
        location,
        resolveRouteMarkerState(
          location.id,
          routeIds,
          revealedIds,
          animationContext.selectedLocationId,
        ),
        animationContext.selectedLocationId,
        false,
      );

      if (index >= routeLocations.length - 1) continue;

      const from = routeLocations[index];
      const to = routeLocations[index + 1];
      const fromLL = toLatLng(from.coordinates);
      const toLL = toLatLng(to.coordinates);
      const duration = computeSegmentDurationForAnimation(from.coordinates, to.coordinates);

      /**
       * 收尾：将本段终点并入 Leaflet 主路线。
       */
      function commitSegmentToActiveRoute() {
        const currentPath = leafletActiveRoute.getLatLngs();
        leafletActiveRoute.setLatLngs([...currentPath, toLL]);
        leafletAnimSegment.setLatLngs([]);
      }

      if (getRouteAnimationMode() === "light") {
        await runLeafletCssSegmentAnimation(
          token,
          fromLL,
          toLL,
          color,
          duration,
          commitSegmentToActiveRoute,
        );
      } else {
        await runRouteSegmentAnimation(
          token,
          duration,
          (progress) => {
            const lat = fromLL[0] + (toLL[0] - fromLL[0]) * progress;
            const lng = fromLL[1] + (toLL[1] - fromLL[1]) * progress;
            leafletAnimSegment.setLatLngs([fromLL, [lat, lng]]);
          },
          commitSegmentToActiveRoute,
        );
      }
    }
  }

  /**
   * 生成 Leaflet 自定义 marker 图标。
   */
  function leafletMarkerIcon(location, state, selectedLocationId = "", revealing = false) {
    return window.L.divIcon({
      className: `leaflet-location-marker leaflet-location-marker--${state}${revealing ? " leaflet-location-marker--revealing" : ""}`,
      html: markerHTML(location, state, selectedLocationId, { revealing }),
      iconSize: [0, 0],
      iconAnchor: [0, 0],
    });
  }

  /**
   * 通过 CDN 加载高德地图（仅在 provider=amap 且配置了 key 时使用）。
   */
  function loadAmapApi(key) {
    const securityCode = mapConfig.amap?.securityCode;
    if (securityCode) {
      window._AMapSecurityConfig = { securityJsCode: securityCode };
    }

    return new Promise((resolve, reject) => {
      if (window.AMap) {
        resolve(window.AMap);
        return;
      }
      const script = document.createElement("script");
      script.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(key)}`;
      script.async = true;
      script.onload = () => (window.AMap ? resolve(window.AMap) : reject(new Error("AMap 未就绪")));
      script.onerror = () => reject(new Error("高德脚本加载失败"));
      document.head.appendChild(script);
    });
  }

  /**
   * 初始化高德地图（可选）。
   */
  async function initAmap() {
    AMapApi = await loadAmapApi(mapConfig.amap.key);
    container.innerHTML = "";
    container.classList.remove("map-canvas--leaflet");

    amap = new AMapApi.Map(container, {
      viewMode: "2D",
      zoom: 5.2,
      center: [
        (geoBounds.minLng + geoBounds.maxLng) / 2,
        (geoBounds.minLat + geoBounds.maxLat) / 2,
      ],
      mapStyle: mapConfig.amap?.mapStyle || "amap://styles/dark",
      features: ["bg", "road", "point"],
    });

    const allPath = allRoutePath;
    const fullStyle = getFullRouteStyle(false);
    amapFullRoute = new AMapApi.Polyline({
      path: allPath,
      strokeColor: fullStyle.color,
      strokeWeight: fullStyle.weight,
      strokeOpacity: fullStyle.opacity,
      strokeStyle: "dashed",
      lineJoin: "round",
      lineCap: "round",
      zIndex: 8,
    });
    amap.add(amapFullRoute);

    amapActiveRoute = new AMapApi.Polyline({
      path: [],
      strokeColor: TONE_COLORS.blackGold,
      strokeWeight: mapConfig.routes?.active?.weight ?? 6,
      strokeOpacity: mapConfig.routes?.active?.opacity ?? 0.55,
      lineJoin: "round",
      lineCap: "round",
      zIndex: 12,
    });
    amap.add(amapActiveRoute);

    amapAnimSegment = new AMapApi.Polyline({
      path: [],
      strokeColor: TONE_COLORS.blackGold,
      strokeWeight: mapConfig.routes?.active?.weight ?? 6,
      strokeOpacity: mapConfig.routes?.active?.opacity ?? 0.55,
      lineJoin: "round",
      lineCap: "round",
      zIndex: 13,
    });
    amap.add(amapAnimSegment);

    locations.forEach((location) => {
      const marker = new AMapApi.Marker({
        position: location.coordinates,
        offset: new AMapApi.Pixel(0, 0),
        content: markerHTML(location, "dimmed"),
        zIndex: getMarkerZIndexOffset(location.id, "dimmed"),
      });
      marker.on("click", () => onSelectLocation(location.id));
      amapMarkers.set(location.id, marker);
      amap.add(marker);
    });

    bindPreviewHoverDelegation();
  }

  /**
   * 立即刷新高德地图状态。
   */
  function updateAmapInstant(activeDay, selectedLocationId, view) {
    const activePath = view.activePath.map((location) => location.coordinates);

    amapActiveRoute.setOptions({ path: activePath, strokeColor: view.color });
    amapAnimSegment?.setOptions({ path: [], strokeColor: view.color });
    const fullRouteStyle = getFullRouteStyle(view.fitAll);
    amapFullRoute?.setOptions({
      strokeColor: fullRouteStyle.color,
      strokeWeight: fullRouteStyle.weight,
      strokeOpacity: fullRouteStyle.opacity,
      strokeStyle: fullRouteStyle.strokeStyle,
    });

    locations.forEach((location) => {
      const markerState = selectedLocationId === location.id
        ? "selected"
        : view.activeIds.has(location.id)
          ? "active"
          : "dimmed";
      syncMarkerState(location, markerState, selectedLocationId, false);
    });

    if (view.fitAll) {
      amap.setFitView(
        Array.from(amapMarkers.values()),
        false,
        getFitPaddingArray(true),
        getFitMaxZoom(true),
      );
      return;
    }

    if (activePath.length > 1) {
      amap.setFitView(
        [amapActiveRoute],
        false,
        getFitPaddingArray(false),
        getFitMaxZoom(false),
      );
    }
  }

  /**
   * 高德路线入场：逐点点亮并逐段绘制连线。
   */
  async function animateAmapRoute(activeDay, selectedLocationId, view, token) {
    const routeLocations = view.activePath;
    const routeIds = activeDay.routeLocationIds;
    const revealedIds = animationContext.revealedIds;
    const color = view.color;

    amapActiveRoute.setOptions({ path: [], strokeColor: color });
    amapAnimSegment.setOptions({ path: [], strokeColor: color });

    syncMarkersForRouteAnimation(routeIds, revealedIds, selectedLocationId);

    const activePath = routeLocations.map((location) => location.coordinates);
    if (activePath.length > 1) {
      amap.setFitView(
        [amapActiveRoute],
        false,
        getFitPaddingArray(false),
        getFitMaxZoom(false),
      );
    }

    for (let index = 0; index < routeLocations.length; index += 1) {
      if (token !== routeAnimationToken) return;

      const location = routeLocations[index];
      revealedIds.add(location.id);

      const markerState = resolveRouteMarkerState(
        location.id,
        routeIds,
        revealedIds,
        animationContext.selectedLocationId,
      );
      syncMarkerState(location, markerState, animationContext.selectedLocationId, true);

      const completedPath = routeLocations
        .slice(0, index + 1)
        .map((item) => item.coordinates);
      amapActiveRoute.setOptions({ path: completedPath, strokeColor: color });

      const stillRunning = await waitPointReveal(token);
      if (!stillRunning) return;

      syncMarkerState(
        location,
        resolveRouteMarkerState(
          location.id,
          routeIds,
          revealedIds,
          animationContext.selectedLocationId,
        ),
        animationContext.selectedLocationId,
        false,
      );

      if (index >= routeLocations.length - 1) continue;

      const from = routeLocations[index];
      const to = routeLocations[index + 1];
      const fromCoords = from.coordinates;
      const toCoords = to.coordinates;
      const duration = computeSegmentDurationForAnimation(fromCoords, toCoords);

      await runRouteSegmentAnimation(
        token,
        duration,
        (progress) => {
          const lng = fromCoords[0] + (toCoords[0] - fromCoords[0]) * progress;
          const lat = fromCoords[1] + (toCoords[1] - fromCoords[1]) * progress;
          amapAnimSegment.setOptions({ path: [fromCoords, [lng, lat]], strokeColor: color });
        },
        () => {
          const currentPath = amapActiveRoute.getPath();
          amapActiveRoute.setOptions({ path: [...currentPath, toCoords], strokeColor: color });
          amapAnimSegment.setOptions({ path: [], strokeColor: color });
        },
      );
    }
  }

  /**
   * 高德轻量路线入场（与 Leaflet 共用分步绘线）。
   */
  async function animateAmapRouteLight(activeDay, selectedLocationId, view, token) {
    await animateAmapRoute(activeDay, selectedLocationId, view, token);
  }

  /**
   * 离线 SVG 俯视路线图（无网络时的最后降级）。
   */
  function initSvgFallback() {
    container.innerHTML = "";
    fallbackLayer = document.createElement("div");
    fallbackLayer.className = "fallback-map";
    container.appendChild(fallbackLayer);
  }

  /**
   * 立即刷新 SVG 路线图。
   */
  function updateSvgFallbackInstant(activeDay, selectedLocationId, view) {
    if (!fallbackLayer) return;

    const points = buildProjectedPoints();
    const allPath = buildPathD(allRoutePath.map(([lng, lat]) => project(lng, lat)));
    const dayPath = view.activePath.length
      ? buildPathD(
          view.activePath.map((location) =>
            project(location.coordinates[0], location.coordinates[1]),
          ),
        )
      : "";
    const color = view.color;

    fallbackLayer.innerHTML = `
      <svg class="fallback-map__svg" viewBox="0 0 1000 620" role="img" aria-label="旅行俯视路线图">
        <defs>
          <filter id="routeGlow">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <path class="fallback-map__route fallback-map__route--full" d="${allPath}" style="${getSvgFullRouteStyle(view.fitAll)}" />
        <path class="fallback-map__route fallback-map__route--active" d="${dayPath}" style="--route-color:${color}" />
      </svg>
      <div class="fallback-map__points">
        ${points
          .map(({ location, x, y }) => {
            const state = selectedLocationId === location.id
              ? "selected"
              : view.activeIds.has(location.id)
                ? "active"
                : "dimmed";
            const showLabel =
              overlapMeta.showLabel.get(location.id) || location.id === selectedLocationId;
            const labelHTML = showLabel
              ? `<small class="map-point__label">${location.name}</small>`
              : "";
            return `
              <button class="map-point map-point--${state}" type="button"
                style="--x:${x}%;--y:${y}%;--tone:${color};z-index:${getMarkerZIndexOffset(location.id, state)}"
                data-location-id="${location.id}" aria-label="查看${location.name}">
                <span></span>${labelHTML}
              </button>`;
          })
          .join("")}
      </div>`;

    fallbackLayer.querySelectorAll("[data-location-id]").forEach((button) => {
      button.addEventListener("click", () => onSelectLocation(button.dataset.locationId));
    });
    bindPreviewHoverDelegation();
  }

  /**
   * 构建 SVG 路线分段 path。
   */
  function buildSegmentPathD(fromLocation, toLocation) {
    const fromPoint = project(fromLocation.coordinates[0], fromLocation.coordinates[1]);
    const toPoint = project(toLocation.coordinates[0], toLocation.coordinates[1]);
    return buildPathD([fromPoint, toPoint]);
  }

  /**
   * 构建 SVG 路线入场所需的 DOM（全程底图 + 分段路径 + 点位按钮）。
   */
  function mountSvgRouteAnimationLayer(activeDay, selectedLocationId, view, revealedIds) {
    const routeLocations = view.activePath;
    const routeIds = activeDay.routeLocationIds;
    const points = buildProjectedPoints();
    const allPath = buildPathD(allRoutePath.map(([lng, lat]) => project(lng, lat)));
    const color = view.color;

    const segmentPaths = routeLocations.slice(0, -1).map((from, index) => ({
      index,
      d: buildSegmentPathD(from, routeLocations[index + 1]),
      duration: computeSegmentDurationForAnimation(
        from.coordinates,
        routeLocations[index + 1].coordinates,
      ),
    }));

    fallbackLayer.innerHTML = `
      <svg class="fallback-map__svg" viewBox="0 0 1000 620" role="img" aria-label="旅行俯视路线图">
        <defs>
          <filter id="routeGlow">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
        <path class="fallback-map__route fallback-map__route--full" d="${allPath}" style="${getSvgFullRouteStyle(view.fitAll)}" />
        ${segmentPaths
          .map(
            ({ index, d }) => `
          <path class="fallback-map__route fallback-map__route--active fallback-map__route--segment"
            data-segment="${index}"
            pathLength="1"
            d="${d}"
            style="--route-color:${color}" />`,
          )
          .join("")}
      </svg>
      <div class="fallback-map__points">
        ${points
          .map(({ location, x, y }) => {
            const markerState = resolveRouteMarkerState(
              location.id,
              routeIds,
              revealedIds,
              selectedLocationId,
            );
            const showLabel =
              overlapMeta.showLabel.get(location.id) || location.id === selectedLocationId;
            const labelHTML = showLabel
              ? `<small class="map-point__label">${location.name}</small>`
              : "";
            return `
              <button class="map-point map-point--${markerState}" type="button"
                style="--x:${x}%;--y:${y}%;--tone:${color};z-index:${getMarkerZIndexOffset(location.id, markerState)}"
                data-location-id="${location.id}" aria-label="查看${location.name}">
                <span></span>${labelHTML}
              </button>`;
          })
          .join("")}
      </div>`;

    fallbackLayer.querySelectorAll("[data-location-id]").forEach((button) => {
      button.addEventListener("click", () => onSelectLocation(button.dataset.locationId));
    });

    return segmentPaths;
  }

  /**
   * 等待 SVG 单段路线绘制动画结束。
   */
  function waitSvgSegmentDraw(segmentIndex, durationMs, token) {
    return new Promise((resolve) => {
      const path = fallbackLayer?.querySelector(`[data-segment="${segmentIndex}"]`);
      if (!path) {
        resolve(token === routeAnimationToken);
        return;
      }

      path.style.setProperty("--segment-duration", `${durationMs}ms`);
      path.classList.add("is-animating");

      /**
       * 动画结束或超时后进入下一段。
       */
      function finish() {
        resolve(token === routeAnimationToken);
      }

      path.addEventListener("animationend", finish, { once: true });
      setTimeout(finish, durationMs + 100);
    });
  }

  /**
   * SVG 轻量路线入场（与 Leaflet 共用节奏配置）。
   */
  async function animateSvgRouteLight(activeDay, selectedLocationId, view, token) {
    await animateSvgRoute(activeDay, selectedLocationId, view, token);
  }

  /**
   * SVG 路线入场：逐点点亮并逐段绘制连线。
   */
  async function animateSvgRoute(activeDay, selectedLocationId, view, token) {
    if (!fallbackLayer) return;

    const routeLocations = view.activePath;
    const routeIds = activeDay.routeLocationIds;
    const revealedIds = animationContext.revealedIds;

    const segmentPaths = mountSvgRouteAnimationLayer(
      activeDay,
      selectedLocationId,
      view,
      revealedIds,
    );

    for (let index = 0; index < routeLocations.length; index += 1) {
      if (token !== routeAnimationToken) return;

      const location = routeLocations[index];
      revealedIds.add(location.id);

      const markerState = resolveRouteMarkerState(
        location.id,
        routeIds,
        revealedIds,
        animationContext.selectedLocationId,
      );
      syncMarkerState(location, markerState, animationContext.selectedLocationId, true);

      const stillRunning = await waitPointReveal(token);
      if (!stillRunning) return;

      syncMarkerState(
        location,
        resolveRouteMarkerState(
          location.id,
          routeIds,
          revealedIds,
          animationContext.selectedLocationId,
        ),
        animationContext.selectedLocationId,
        false,
      );

      if (index >= routeLocations.length - 1) continue;

      const segment = segmentPaths[index];
      const segmentRunning = await waitSvgSegmentDraw(segment.index, segment.duration, token);
      if (!segmentRunning) return;
    }
  }

  /**
   * 构建全程路线坐标序列。
   */
  function buildAllRoutePath() {
    return days
      .flatMap((day) => day.routeLocationIds)
      .map((id) => locationById.get(id))
      .filter(Boolean)
      .map((location) => location.coordinates);
  }

  /**
   * 生成 marker HTML（重叠坐标仅渲染时间上较新的地点名称）。
   */
  function markerHTML(location, state, selectedLocationId = "", options = {}) {
    const { revealing = false } = options;
    const showLabel =
      overlapMeta.showLabel.get(location.id) || location.id === selectedLocationId;
    const labelHTML = showLabel
      ? `<span class="map-location-marker__label">${location.name}</span>`
      : "";
    const revealClass = revealing ? " map-location-marker--revealing" : "";
    return `<button class="map-location-marker map-location-marker--${state}${revealClass}" type="button" data-location-id="${location.id}" title="${location.name}"><span class="map-location-marker__dot"></span>${labelHTML}</button>`;
  }

  /**
   * 将地点投影到 SVG 百分比坐标（边界来自全部地点）。
   */
  function buildProjectedPoints() {
    return locations.map((location) => {
      const [x, y] = project(location.coordinates[0], location.coordinates[1]);
      return { location, x, y };
    });
  }

  /**
   * 经纬度投影到 0-100 平面。
   */
  function project(lng, lat) {
    const { minLng, maxLng, minLat, maxLat } = geoBounds;
    const x = ((lng - minLng) / (maxLng - minLng)) * 88 + 6;
    const y = (1 - (lat - minLat) / (maxLat - minLat)) * 78 + 11;
    return [Number(x.toFixed(2)), Number(y.toFixed(2))];
  }

  /**
   * 生成 SVG path。
   */
  function buildPathD(points) {
    return points.map(([x, y], index) => `${index === 0 ? "M" : "L"} ${x * 10} ${y * 6.2}`).join(" ");
  }

  return {
    init,
    update,
    rebuildLocationPreviewIndex,
    startFullJourneyPlayback,
    stopFullJourneyPlayback,
    isFullJourneyPlaybackActive,
  };
}

/**
 * 加载行程数据：file:// 使用 HTML 内嵌 JSON；http(s) 优先读取 ./data/ 便于开发时改 JSON。
 */
async function loadTravelData() {
  const embeddedEl = document.getElementById("travel-embedded-data");
  const canFetchRemote =
    window.location.protocol === "http:" || window.location.protocol === "https:";

  if (canFetchRemote) {
    try {
      const base = new URL("./data/", window.location.href);
      const [days, locations, mapConfig] = await Promise.all([
        fetch(new URL("days.json", base)).then((response) => {
          if (!response.ok) throw new Error(`days.json ${response.status}`);
          return response.json();
        }),
        fetch(new URL("locations.json", base)).then((response) => {
          if (!response.ok) throw new Error(`locations.json ${response.status}`);
          return response.json();
        }),
        fetch(new URL("map.json", base)).then((response) => {
          if (!response.ok) throw new Error(`map.json ${response.status}`);
          return response.json();
        }),
      ]);
      return { days, locations, mapConfig };
    } catch (error) {
      console.warn("远程 data/ 加载失败，改用内嵌数据。", error);
    }
  }

  if (!embeddedEl?.textContent?.trim()) {
    throw new Error(
      "未找到内嵌旅行数据。请运行 python3 scripts/embed-travel-data.py 将 data/ 同步进 index.html。",
    );
  }

  const payload = JSON.parse(embeddedEl.textContent.trim());
  if (!Array.isArray(payload.days) || !Array.isArray(payload.locations)) {
    throw new Error("内嵌旅行数据格式无效，需包含 days 与 locations 数组。");
  }

  return {
    days: payload.days,
    locations: payload.locations,
    mapConfig: payload.map ?? payload.mapConfig ?? {},
  };
}

/**
 * 启动旅行周记应用，加载数据并完成首屏渲染。
 */
async function bootstrap() {
  const app = document.querySelector("#app");
  app.innerHTML = renderShell();

  const { days, locations, mapConfig } = await loadTravelData();
  loadPersistedPhotos(locations);

  state.days = days;
  state.locations = locations;
  state.mapConfig = mapConfig;
  state.activeDate = null;
  state.selectedLocationId = locations[0]?.id || "";
  state.map = createTravelMap({
    container: document.querySelector("#map"),
    onSelectLocation: selectLocation,
    onFullJourneyPlaybackChange: syncJourneyPlayButton,
  });

  renderStaticContent();
  bindEvents();
  await state.map.init(days, locations, mapConfig);
  syncEntryGateCopy(mapConfig);
  bindEntryGate();
  updateView();
}

/**
 * 将 map.json 中的游记标题与按钮文案写入入口层。
 */
function syncEntryGateCopy(mapConfig) {
  const title = mapConfig.journalTitle || "我的游记";
  const subtitle = mapConfig.journalTitleEn || "Sichuan–Tibet Travel Journal";
  const enterLabel = mapConfig.entryButtonLabel || "进入";

  const titleEl = document.querySelector("[data-entry-title]");
  const subtitleEl = document.querySelector("[data-entry-subtitle]");
  const enterEl = document.querySelector("[data-entry-enter]");

  if (titleEl) titleEl.textContent = title;
  if (subtitleEl) subtitleEl.textContent = subtitle;
  if (enterEl) enterEl.textContent = enterLabel;
}

/**
 * 绑定入口层「进入」按钮，点击后淡出并解锁主界面交互。
 */
function bindEntryGate() {
  const gate = document.querySelector("[data-entry-gate]");
  const enterBtn = document.querySelector("[data-entry-enter]");
  if (!gate || !enterBtn) return;

  enterBtn.addEventListener("click", () => dismissEntryGate());
}

/**
 * 关闭入口层，显示日期切换与详情面板。
 */
function dismissEntryGate() {
  const shell = document.querySelector(".app-shell");
  const gate = document.querySelector("[data-entry-gate]");
  if (!shell || !gate || !shell.classList.contains("app-shell--gated")) return;

  gate.classList.add("entry-gate--leaving");

  const finish = () => {
    shell.classList.remove("app-shell--gated");
    gate.remove();
  };

  gate.addEventListener("animationend", finish, { once: true });
  window.setTimeout(finish, 720);
}

/**
 * 渲染日期列表等只依赖原始数据的静态内容。
 */
function renderStaticContent() {
  const rail = document.querySelector("[data-date-rail]");
  rail.innerHTML = state.days
    .map((day) => `
      <button
        class="date-cell"
        type="button"
        data-date="${day.date}"
      >
        <span>${day.label}</span>

/**
 * 打开日期选择弹层。
 */
function openDatePicker() {
  const switcher = document.querySelector("[data-date-switcher]");
  const trigger = document.querySelector("[data-date-trigger]");
  switcher.classList.add("is-picker-open");
  trigger.setAttribute("aria-expanded", "true");
}

/**
 * 关闭日期选择弹层。
 */
function closeDatePicker() {
  const switcher = document.querySelector("[data-date-switcher]");
  const trigger = document.querySelector("[data-date-trigger]");
  switcher.classList.remove("is-picker-open");
  trigger.setAttribute("aria-expanded", "false");
}

/**
 * 清除日期筛选，进入全程总览模式。
 */
function clearDateFilter() {
  state.activeDate = null;
  closeDatePicker();
  updateView();
}

/**
 * 获取当前日期内的地点 id 列表（按当日路线顺序）。
 */
function getActiveDayLocationIds() {
  const activeDay = getActiveDay();
  return activeDay?.routeLocationIds ?? [];
}

/**
 * 刷新日期切换条的文案与箭头可用状态。
 */
function syncDateSwitcherUI() {
  const switcher = document.querySelector("[data-date-switcher]");
  const hasDay = Boolean(state.activeDate);
  const activeDay = getActiveDay();
  const selectedLocation = getSelectedLocation();
  const currentIndex = hasDay
    ? state.days.findIndex((day) => day.date === state.activeDate)
    : -1;

  switcher.classList.toggle("date-switcher--cleared", !hasDay);
  document.querySelector("[data-current-weekday]").textContent = hasDay ? activeDay.weekday : "全程";
  document.querySelector("[data-current-date]").textContent = hasDay ? activeDay.label : "全部旅程";
  document.querySelector("[data-current-location]").textContent = hasDay
    ? selectedLocation?.name || ""
    : "";

  const prevBtn = document.querySelector("[data-date-prev]");
  const nextBtn = document.querySelector("[data-date-next]");
  prevBtn.disabled = hasDay && currentIndex <= 0;
  nextBtn.disabled = hasDay && currentIndex >= state.days.length - 1;

  const locPrevBtn = document.querySelector("[data-location-prev]");
  const locNextBtn = document.querySelector("[data-location-next]");
  locPrevBtn.disabled = !hasDay;
  locNextBtn.disabled = !hasDay;

  document.querySelectorAll("[data-date-rail] [data-date]").forEach((button) => {
    button.classList.toggle("is-active", hasDay && button.dataset.date === state.activeDate);
  });

  syncJourneyPlayButton();
}

/**
 * 同步全程播放按钮的可见性与播放/停止状态。
 */
function syncJourneyPlayButton() {
  const playBtn = document.querySelector("[data-journey-play]");
  const playIcon = document.querySelector("[data-journey-play-icon]");
  if (!playBtn || !playIcon) return;

  const show = !state.activeDate;
  const playing = state.map?.isFullJourneyPlaybackActive?.() ?? false;

  playBtn.hidden = !show;
  playBtn.classList.toggle("is-playing", playing);
  playBtn.setAttribute("aria-label", playing ? "停止播放" : "播放全程路线");
  playIcon.textContent = playing ? "■" : "▶";
  playIcon.classList.toggle("journey-play-btn__icon--stop", playing);
}

/**
 * 绑定日期切换、键盘导航和窗口级交互。
 */
function bindEvents() {
  document.querySelector("[data-date-prev]").addEventListener("click", () => stepDate(-1));
  document.querySelector("[data-date-next]").addEventListener("click", () => stepDate(1));
  document.querySelector("[data-location-prev]").addEventListener("click", () => stepLocation(-1));
  document.querySelector("[data-location-next]").addEventListener("click", () => stepLocation(1));

  document.querySelector("[data-date-trigger]").addEventListener("click", () => {
    const switcher = document.querySelector("[data-date-switcher]");
    if (switcher.classList.contains("is-picker-open")) {
      closeDatePicker();
      return;
    }
    openDatePicker();
  });

  document.querySelector("[data-date-picker-close]").addEventListener("click", closeDatePicker);
  document.querySelector("[data-date-clear]").addEventListener("click", clearDateFilter);

  document.querySelector("[data-journey-play]")?.addEventListener("click", () => {
    if (!state.activeDate) {
      state.map.startFullJourneyPlayback();
    }
  });

  document.querySelector("[data-details-panel]").addEventListener("click", (event) => {
    if (event.target.closest("[data-details-toggle]")) {
      toggleDetailsPanel();
      return;
    }

    if (event.target.closest("[data-photo-pick]")) {
      document.querySelector("[data-photo-input]")?.click();
      return;
    }

    const deleteButton = event.target.closest("[data-photo-delete]");
    if (deleteButton) {
      removePhotoFromLocation(deleteButton.dataset.photoDelete);
    }
  });

  bindPhotoBoardDragAndDrop();

  document.querySelector("[data-date-rail]").addEventListener("click", (event) => {
    const button = event.target.closest("[data-date]");
    if (!button) return;
    selectDate(button.dataset.date);
    closeDatePicker();
  });

  document.addEventListener("click", (event) => {
    const switcher = document.querySelector("[data-date-switcher]");
    if (!switcher.classList.contains("is-picker-open")) return;
    if (switcher.contains(event.target)) return;
    closeDatePicker();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      closeDatePicker();
      return;
    }
    const tag = event.target?.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA" || event.target?.isContentEditable) return;

    if (event.key === "ArrowLeft") {
      stepDate(-1);
    }
    if (event.key === "ArrowRight") {
      stepDate(1);
    }
    if (event.key === "ArrowUp") {
      stepLocation(-1);
    }
    if (event.key === "ArrowDown") {
      stepLocation(1);
    }
  });
}

/**
 * 按日期设置当前行程，并选中指定地点（缺省为当日首个地点）。
 */
function selectDateWithLocation(date, locationId = "") {
  const day = state.days.find((item) => item.date === date);
  if (!day) return;

  const routeIds = day.routeLocationIds;
  state.activeDate = date;
  state.selectedLocationId =
    locationId && routeIds.includes(locationId) ? locationId : routeIds[0] || "";
  updateView();
}

/**
 * 按日期设置当前行程，并默认选中当日第一个地点。
 */
function selectDate(date) {
  selectDateWithLocation(date);
}

/**
 * 通过键盘左右键切换前后日期。
 */
function stepDate(delta) {
  if (!state.activeDate) {
    selectDate(state.days[delta > 0 ? 0 : state.days.length - 1].date);
    return;
  }

  const currentIndex = state.days.findIndex((day) => day.date === state.activeDate);
  const nextIndex = Math.min(Math.max(currentIndex + delta, 0), state.days.length - 1);
  if (nextIndex !== currentIndex) {
    selectDate(state.days[nextIndex].date);
  }
}

/**
 * 在已选日期内按路线顺序切换地点；到达当日首尾时自动切换前后日期。
 */
function stepLocation(delta) {
  if (!state.activeDate) {
    if (!state.days.length) return;
    const edgeDay = state.days[delta > 0 ? 0 : state.days.length - 1];
    const edgeIds = edgeDay.routeLocationIds;
    selectDateWithLocation(
      edgeDay.date,
      delta > 0 ? edgeIds[0] : edgeIds[edgeIds.length - 1],
    );
    return;
  }

  const dayLocationIds = getActiveDayLocationIds();
  if (!dayLocationIds.length) return;

  const currentIndex = dayLocationIds.indexOf(state.selectedLocationId);
  const baseIndex = currentIndex >= 0 ? currentIndex : 0;
  const nextIndex = baseIndex + delta;

  if (nextIndex >= 0 && nextIndex < dayLocationIds.length) {
    selectLocation(dayLocationIds[nextIndex]);
    return;
  }

  const dayIndex = state.days.findIndex((day) => day.date === state.activeDate);
  const targetDayIndex = dayIndex + delta;
  if (targetDayIndex < 0 || targetDayIndex >= state.days.length) return;

  const targetDay = state.days[targetDayIndex];
  const targetIds = targetDay.routeLocationIds;
  if (!targetIds.length) return;

  const targetLocationId = delta > 0 ? targetIds[0] : targetIds[targetIds.length - 1];
  selectDateWithLocation(targetDay.date, targetLocationId);
}

/**
 * 切换详情浮窗展开 / 收起状态。
 */
function toggleDetailsPanel() {
  state.detailsPanelExpanded = !state.detailsPanelExpanded;
  syncDetailsPanelExpanded();
}

/**
 * 全部旅程（未选日期）时隐藏详情浮窗。
 */
function syncDetailsPanelVisibility() {
  const panel = document.querySelector("[data-details-panel]");
  const visible = Boolean(state.activeDate);
  panel.classList.toggle("details-panel--hidden", !visible);
}

/**
 * 将展开状态同步到详情浮窗 DOM。
 */
function syncDetailsPanelExpanded() {
  const panel = document.querySelector("[data-details-panel]");
  panel.classList.toggle("details-panel--collapsed", !state.detailsPanelExpanded);

  const toggle = panel.querySelector("[data-details-toggle]");
  if (!toggle) return;

  toggle.setAttribute("aria-expanded", String(state.detailsPanelExpanded));
  toggle.setAttribute(
    "aria-label",
    state.detailsPanelExpanded ? "收起详情" : "展开详情",
  );
}

/**
 * 解析地点应对应的行程日期（取该地点在路线中首次出现的日期）。
 */
function resolveDateForLocation(locationId) {
  const day = state.days.find((item) => item.routeLocationIds.includes(locationId));
  if (day) return day.date;

  const location = state.locations.find((item) => item.id === locationId);
  return location?.dates?.[0] ?? null;
}

/**
 * 设置当前选中地点；全程模式下点击地图会切入该地点所属日期并打开详情浮窗。
 */
function selectLocation(locationId) {
  const location = state.locations.find((item) => item.id === locationId);
  if (!location) return;

  state.selectedLocationId = locationId;

  if (!state.activeDate || !location.dates.includes(state.activeDate)) {
    const date = resolveDateForLocation(locationId);
    if (date) state.activeDate = date;
  }

  updateView();
}

/**
 * 根据当前状态刷新地图、日期栏和详情面板。
 */
function updateView() {
  const activeDay = getActiveDay();
  const selectedLocation = getSelectedLocation();
  const shell = document.querySelector(".app-shell");
  const hasDay = Boolean(activeDay);

  if (hasDay && state.map?.isFullJourneyPlaybackActive?.()) {
    state.map.stopFullJourneyPlayback();
  }

  shell.dataset.tone = hasDay ? activeDay.tone : "blackGold";

  syncDateSwitcherUI();
  syncDetailsPanelVisibility();

  if (hasDay) {
    renderDetails(activeDay, selectedLocation);
    syncDetailsPanelExpanded();
  } else {
    document.querySelector("[data-details-content]").innerHTML = "";
  }

  state.map.update(activeDay, selectedLocation.id);
}

/**
 * 渲染右侧地点详情、日记摘录与可编辑照片区。
 */
function renderDetails(activeDay, location) {
  const content = document.querySelector("[data-details-content]");
  const hasDay = Boolean(activeDay);
  const activeLocations = hasDay
    ? activeDay.routeLocationIds
        .map((id) => state.locations.find((item) => item.id === id))
        .filter(Boolean)
    : [];

  const locationSequenceHTML = hasDay
    ? `
      <div class="location-sequence" aria-label="当天地点">
        ${activeLocations
          .map((item) => `
            <button
              type="button"
              class="${item.id === location.id ? "is-active" : ""}"
              data-location-jump="${item.id}"
            >
              ${item.name}
            </button>
          `)
          .join("")}
      </div>`
    : "";

  const expanded = state.detailsPanelExpanded;

  content.innerHTML = `
    <div class="details-panel__inner" data-reveal="rack">
      <div class="details-panel__head">
        <h2>${location.name}</h2>
        <button
          type="button"
          class="details-panel__toggle"
          data-details-toggle
          aria-expanded="${expanded}"
          aria-label="${expanded ? "收起详情" : "展开详情"}"
        >
          <svg class="details-panel__toggle-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M4 6l4 4 4-4" />
          </svg>
        </button>
      </div>
      <p class="panel-summary">${hasDay ? activeDay.summary : "在左上角选择日期，可聚焦某一天的路线与色调。"}</p>
      ${locationSequenceHTML}
      <div class="details-panel__body">
        <blockquote>${location.diaryExcerpt}</blockquote>
        <section class="photo-board" aria-label="旅行照片" data-photo-board data-location-id="${location.id}">
          ${renderPhotos(location, activeDay)}
        </section>
      </div>
    </div>
  `;

  content.querySelectorAll("[data-location-jump]").forEach((button) => {
    button.addEventListener("click", () => selectLocation(button.dataset.locationJump));
  });
}

/**
 * 转义写入 HTML 属性的文本，避免破坏模板字符串。
 */
function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/**
 * 从 localStorage 恢复用户为各地点添加的照片。
 */
function loadPersistedPhotos(locations) {
  let stored = {};
  try {
    const raw = localStorage.getItem(PHOTOS_STORAGE_KEY);
    if (raw) stored = JSON.parse(raw);
  } catch (error) {
    console.warn("无法读取已保存的照片。", error);
  }

  locations.forEach((location) => {
    const saved = stored[location.id];
    if (Array.isArray(saved) && saved.length > 0) {
      location.photos = saved;
    }
  });
}

/**
 * 将指定地点的照片数组写入 localStorage。
 */
function persistLocationPhotos(locationId) {
  const location = state.locations.find((item) => item.id === locationId);
  if (!location) return;

  let stored = {};
  try {
    const raw = localStorage.getItem(PHOTOS_STORAGE_KEY);
    if (raw) stored = JSON.parse(raw);
  } catch {
    stored = {};
  }

  stored[locationId] = location.photos || [];
  try {
    localStorage.setItem(PHOTOS_STORAGE_KEY, JSON.stringify(stored));
  } catch (error) {
    console.warn("照片保存失败，可能超出浏览器存储限额。", error);
  }
}

/**
 * 将单个图片文件读取为可持久化的 data URL（仅作为压缩失败时的兜底）。
 */
function readFileAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

/**
 * 将文件解码为 HTMLImageElement，用于离屏缩放。
 */
function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("图片解码失败"));
    };
    img.src = url;
  });
}

/**
 * 用 canvas 把图片等比缩放到指定最大边并导出 JPEG data URL。
 */
function downscaleImage(img, maxSize, quality) {
  const ratio = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));
  const width = Math.max(1, Math.round(img.naturalWidth * ratio));
  const height = Math.max(1, Math.round(img.naturalHeight * ratio));
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, width, height);
  return canvas.toDataURL("image/jpeg", quality);
}

/**
 * 把用户选择的图片文件转为照片记录对象列表（上传即在浏览器端压缩，
 * 生成 medium + thumb 两档，避免原图撑爆内存与 localStorage 配额）。
 */
async function filesToPhotoRecords(files) {
  const imageFiles = Array.from(files).filter((file) => file.type.startsWith("image/"));
  const records = await Promise.all(
    imageFiles.map(async (file) => {
      const baseName = file.name.replace(/\.[^.]+$/, "");
      const id = `photo-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      try {
        const img = await loadImageFromFile(file);
        return {
          id,
          src: downscaleImage(img, 1600, 0.8),
          thumb: downscaleImage(img, 480, 0.7),
          caption: baseName,
        };
      } catch (error) {
        console.warn("图片压缩失败，回退为原图存储。", error);
        const src = await readFileAsDataUrl(file);
        return { id, src, thumb: src, caption: baseName };
      }
    }),
  );
  return records;
}

/**
 * 为当前地点追加照片并刷新详情面板。
 */
async function addPhotosToLocation(locationId, files) {
  const location = state.locations.find((item) => item.id === locationId);
  if (!location || !files?.length) return;

  const records = await filesToPhotoRecords(files);
  if (!records.length) return;

  if (!Array.isArray(location.photos)) location.photos = [];
  location.photos.push(...records);
  persistLocationPhotos(locationId);
  state.map?.rebuildLocationPreviewIndex?.();
  refreshPhotoBoardIfVisible(locationId);
}

/**
 * 删除指定地点的一张照片。
 */
function removePhotoFromLocation(photoId) {
  const board = document.querySelector("[data-photo-board]");
  const locationId = board?.dataset.locationId;
  if (!locationId || !photoId) return;

  const location = state.locations.find((item) => item.id === locationId);
  if (!location?.photos?.length) return;

  location.photos = location.photos.filter((photo) => {
    const id = photo.id || photo.src;
    return id !== photoId;
  });
  persistLocationPhotos(locationId);
  state.map?.rebuildLocationPreviewIndex?.();
  refreshPhotoBoardIfVisible(locationId);
}

/**
 * 若详情面板正在展示该地点，则仅重绘照片区域。
 */
function refreshPhotoBoardIfVisible(locationId) {
  const activeDay = getActiveDay();
  const location = state.locations.find((item) => item.id === locationId);
  if (!activeDay || !location || state.selectedLocationId !== locationId) return;

  const board = document.querySelector("[data-photo-board]");
  if (!board) return;

  board.innerHTML = renderPhotos(location, activeDay);
}

/**
 * 处理文件选择或拖拽放入的图片。
 */
async function handlePhotoFiles(locationId, fileList) {
  if (!locationId || !fileList?.length) return;
  await addPhotosToLocation(locationId, fileList);
}

/**
 * 绑定照片区的拖拽放入与文件选择交互。
 */
function bindPhotoBoardDragAndDrop() {
  const panel = document.querySelector("[data-details-panel]");
  if (!panel || panel.dataset.photoDndBound === "true") return;
  panel.dataset.photoDndBound = "true";

  panel.addEventListener("change", (event) => {
    const input = event.target.closest("[data-photo-input]");
    if (!input) return;
    const board = input.closest("[data-photo-board]");
    if (!board) return;
    handlePhotoFiles(board.dataset.locationId, input.files);
    input.value = "";
  });

  ["dragenter", "dragover"].forEach((type) => {
    panel.addEventListener(type, (event) => {
      const zone = event.target.closest("[data-photo-dropzone]");
      if (!zone) return;
      event.preventDefault();
      zone.classList.add("is-dragover");
    });
  });

  panel.addEventListener("dragleave", (event) => {
    const zone = event.target.closest("[data-photo-dropzone]");
    if (!zone || zone.contains(event.relatedTarget)) return;
    zone.classList.remove("is-dragover");
  });

  panel.addEventListener("drop", (event) => {
    const zone = event.target.closest("[data-photo-dropzone]");
    if (!zone) return;
    event.preventDefault();
    zone.classList.remove("is-dragover");
    const board = zone.closest("[data-photo-board]");
    if (!board) return;
    handlePhotoFiles(board.dataset.locationId, event.dataTransfer?.files);
  });
}

/**
 * 渲染用户照片与可拖拽添加的投放区。
 */
function renderPhotos(location, activeDay) {
  const dayLabel = activeDay?.label || "旅途";
  const photos = (location.photos || []).filter((photo) => photo.src);

  const frames = photos
    .map((photo, index) => {
      const photoId = photo.id || photo.src;
      const caption = photo.caption || `${dayLabel} · ${location.name}`;
      return `
        <figure class="photo-frame" style="--i:${index}" data-photo-id="${escapeHtml(photoId)}">
          <div class="photo-frame__media">
            <img src="${escapeHtml(photo.src)}" alt="${escapeHtml(caption)}" loading="lazy" decoding="async" />
            <button
              type="button"
              class="photo-frame__delete"
              data-photo-delete="${escapeHtml(photoId)}"
              aria-label="删除照片"
            >×</button>
          </div>
          <figcaption>${escapeHtml(caption)}</figcaption>
        </figure>
      `;
    })
    .join("");

  return `
    ${frames}
    <div class="photo-dropzone" data-photo-dropzone>
      <input
        type="file"
        accept="image/*"
        multiple
        hidden
        data-photo-input
        aria-label="选择图片文件"
      />
      <p>拖拽图片到此处，或 <button type="button" class="photo-dropzone__pick" data-photo-pick>选择文件</button></p>
    </div>
  `;
}

/**
 * 获取当前日期对象。
 */
function getActiveDay() {
  if (!state.activeDate) return null;
  return state.days.find((day) => day.date === state.activeDate) || null;
}

/**
 * 获取当前地点对象，并在缺失时回落到当天第一个地点。
 */
function getSelectedLocation() {
  const activeDay = getActiveDay();
  const selected = state.locations.find((location) => location.id === state.selectedLocationId);
  if (selected) return selected;

  if (activeDay?.routeLocationIds?.[0]) {
    return state.locations.find((location) => location.id === activeDay.routeLocationIds[0]);
  }

  return state.locations[0];
}

bootstrap().catch((error) => {
  console.error(error);
  document.querySelector("#app").innerHTML = `
    <main class="fatal-error">
      <h1>旅行地图暂时无法加载</h1>
      <p>${error.message}</p>
    </main>
  `;
});
